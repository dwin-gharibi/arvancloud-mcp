apiVersion: apps/v1
kind: Deployment
metadata:
  name: arvancloud-mcp
  namespace: arvancloud-mcp
  labels:
    app.kubernetes.io/name: arvancloud-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: arvancloud-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arvancloud-mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: arvancloud-mcp
          image: arvancloud-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: arvancloud-mcp-config
            - secretRef:
                name: arvancloud-mcp-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
