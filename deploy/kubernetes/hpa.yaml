apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arvancloud-mcp
  namespace: arvancloud-mcp
  labels:
    app.kubernetes.io/name: arvancloud-mcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arvancloud-mcp
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
